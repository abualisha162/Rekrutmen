<!DOCTYPE html>
<html>
<head>
    <title>Web App Saya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 400px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Data dari Google Sheets</h1>
        <div id="loading">Memuat data...</div>
        <pre id="konten"></pre>
    </div>

    <script>
        // GANTI LINK DI BAWAH DENGAN URL WEB APP ANDA
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxWMamhwBGBpJJaNaOICrtqY0-TOfYG--7rpcpzofisaftnCWqUOYi-ozM9ayvC3MR94w/exec";

        fetch(URL_SCRIPT, { method: 'GET' })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('konten').innerText = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('loading').innerText = "Gagal memuat data.";
                console.error(err);
            });
    </script>
</body>
</html>
